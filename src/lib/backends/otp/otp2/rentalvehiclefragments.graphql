fragment rentalVehicleStationFragment on VehicleRentalStation {
    allowDropoff
    allowDropoffNow
    allowOverloading
    allowPickup
    allowPickupNow
    availableSpaces { ...rentalVehicleEntityCountsFragment }
    availableVehicles { ...rentalVehicleEntityCountsFragment }
    capacity
    id: stationId
    lat
    lon
    name
    operative
    realtime
    rentalNetwork { ...rentalNetworkFragment }
    rentalUris { ...rentalUrisFragment }
}

fragment rentalVehicleEntityCountsFragment on RentalVehicleEntityCounts {
    byType {
        count
        vehicleType { ...rentalVehicleTypeFragment }
    }
    total
}

fragment rentalNetworkFragment on VehicleRentalNetwork {
    networkId
    url
}

fragment rentalUrisFragment on VehicleRentalUris {
    android
    ios
    web
}

fragment rentalVehicleTypeFragment on RentalVehicleType {
    formFactor
    propulsionType
}
