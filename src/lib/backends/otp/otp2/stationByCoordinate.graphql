query stopsByCoordinate(
    $lat: Float!,
    $lon: Float!,
    $radius: Int!,
    $maxResults: Int!,
    $placeType: [FilterPlaceType]!
) {
    stopsByRadius: nearest(
        lat: $lat,
        lon: $lon,
        maxDistance: $radius,
        maxResults: $maxResults,
        filterByPlaceTypes: $placeType
    ) {
        edges {
            node {
                stop: place { ...on Stop {
                    id: gtfsId
                    name
                    lat
                    lon
                    vehicleMode
                    parentStation {
                        id: gtfsId
                        name
                        lat
                        lon
                    }
                    routes {
                        type
                        shortName
                        longName
                        color
                        textColor
                        agency {
                            name
                            url
                        }
                    }
                }}
                rentalVehicleStation: place { ...rentalVehicleStationFragment }
                rentalVehicle: place { ...rentalVehicleFragment }
            }
        }
    }
}

fragment rentalVehicleStationFragment on VehicleRentalStation {
    allowDropoff
    allowDropoffNow
    allowOverloading
    allowPickup
    allowPickupNow
    availableSpaces { ...rentalVehicleEntityCountsFragment }
    availableVehicles { ...rentalVehicleEntityCountsFragment }
    capacity
    id
    lat
    lon
    name
    operative
    realtime
    rentalNetwork { ...rentalNetworkFragment }
    rentalUris { ...rentalUrisFragment }
    stationId
}

fragment rentalVehicleFragment on RentalVehicle {
    allowPickupNow
    availableUntil
    fuel { ...rentalVehicleFuelFragment }
    id
    lat
    lon
    name
    operative
    rentalNetwork { ...rentalNetworkFragment }
    rentalUris { ...rentalUrisFragment }
    vehicleId
    vehicleType { ...rentalVehicleTypeFragment }
}

fragment rentalVehicleEntityCountsFragment on RentalVehicleEntityCounts {
    byType {
        count
        vehicleType { ...rentalVehicleTypeFragment }
    }
    total
}

fragment rentalNetworkFragment on VehicleRentalNetwork {
    networkId
    url
}

fragment rentalUrisFragment on VehicleRentalUris {
    android
    ios
    web
}

fragment rentalVehicleFuelFragment on RentalVehicleFuel {
    percent
    range
}

fragment rentalVehicleTypeFragment on RentalVehicleType {
    formFactor
    propulsionType
}
