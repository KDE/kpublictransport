query stopsByCoordinate(
    $lat: Float!,
    $lon: Float!,
    $radius: Int!,
    $maxResults: Int!,
    $placeType: [FilterPlaceType]!
) {
    stopsByRadius: nearest(
        lat: $lat,
        lon: $lon,
        maxDistance: $radius,
        maxResults: $maxResults,
        filterByPlaceTypes: $placeType
    ) {
        edges {
            node {
                stop: place { ...on Stop {
                    id: gtfsId
                    name
                    lat
                    lon
                    timezone
                    parentStation {
                        id: gtfsId
                        name
                        lat
                        lon
                        timezone
                    }
                }}
                rentalVehicleStation: place { ...bikeRentalStationFragment }
            }
        }
    }
}

fragment bikeRentalStationFragment on BikeRentalStation {
    id
    stationId
    name
    bikesAvailable
    spacesAvailable
    capacity - missing in Torino, available w/ Peatus
    state
    realtime
    allowDropoff
    allowOverloading - same
    isFloatingBike
    isCarStation
    networks
    lat
    lon
}
